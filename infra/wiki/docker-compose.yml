services:
  # ─── Wiki.js ─────────────────────────────────────────────────
  wiki:
    image: ghcr.io/requarks/wiki:2
    restart: unless-stopped
    ports:
      - "${WIKI_PORT:-3000}:3000"
    environment:
      DB_TYPE: postgres
      DB_HOST: ${DB_POSTGRES_HOST}
      DB_PORT: ${DB_POSTGRES_PORT}
      DB_NAME: ${DB_POSTGRES_DB}
      DB_USER: ${DB_POSTGRES_USER}
      DB_PASS: ${DB_POSTGRES_PASS}
      WIKI_ADMIN_EMAIL: ${WIKI_ADMIN_EMAIL}
    volumes:
      - ./config:/wiki/config
      - ./data:/wiki/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wiki-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_POSTGRES_DB}
      POSTGRES_USER: ${DB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASS}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - wiki-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_POSTGRES_USER} -d ${DB_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pg-data:

networks:
  wiki-net:
