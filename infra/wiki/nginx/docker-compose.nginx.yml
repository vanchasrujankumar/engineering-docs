# ─── Companion: NGINX + Certbot for HTTPS ──────────────────────
# Deploy alongside wiki.yml for production HTTPS.
# Usage: docker compose -f docker-compose.yml -f nginx/docker-compose.nginx.yml up -d
version: "3.8"

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/wiki.conf:/etc/nginx/conf.d/wiki.conf:ro
      - ./nginx/ssl:/etc/letsencrypt:ro
      - ./nginx/html:/var/www/certbot
    depends_on:
      - wiki
    networks:
      - wiki-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - ./nginx/html:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        certbot renew --quiet
        sleep 12h & wait $${!}
      done"
