name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken internal links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: yes
          config-file: .mlc-config.json

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Validate docs structure
        run: npm run test:docs

      - name: Validate live GitHub Pages
        run: npm run test:pages

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Start Wiki.js stack
        working-directory: infra/wiki
        run: |
          cp .env.example .env
          docker compose up -d --wait

      - name: Wait for Wiki.js to be ready
        run: |
          for i in $(seq 1 30); do
            curl -s -o /dev/null -w '%{http_code}' http://localhost:3000 | grep -q 200 && break
            sleep 2
          done

      - name: Run Playwright tests
        run: npm run test:wiki
