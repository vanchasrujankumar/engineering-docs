<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engineering Docs</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --bg-sidebar: #f6f8fa;
      --bg-code: #f3f4f6;
      --bg-hover: #e8eaed;
      --border: #d0d7de;
      --text: #1f2328;
      --text-secondary: #656d76;
      --text-muted: #8b949e;
      --accent: #0969da;
      --accent-hover: #0550ae;
      --sidebar-width: 280px;
      --toc-width: 220px;
    }
    [data-theme="dark"] {
      --bg: #0d1117;
      --bg-sidebar: #161b22;
      --bg-code: #1c2128;
      --bg-hover: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #484f58;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px; line-height: 1.7; color: var(--text); background: var(--bg);
      display: flex; min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }
    .sidebar {
      width: var(--sidebar-width); min-width: var(--sidebar-width);
      background: var(--bg-sidebar); border-right: 1px solid var(--border);
      padding: 24px 0; overflow-y: auto; height: 100vh; position: sticky; top: 0;
    }
    .sidebar-logo {
      padding: 0 20px 20px; font-size: 18px; font-weight: 700;
      border-bottom: 1px solid var(--border); margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .sidebar-logo svg { width: 24px; height: 24px; }
    .sidebar-section { padding: 8px 20px 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); }
    .sidebar a {
      display: block; padding: 6px 20px; font-size: 14px; color: var(--text-secondary);
      border-left: 2px solid transparent; transition: all .15s;
    }
    .sidebar a:hover { background: var(--bg-hover); color: var(--text); text-decoration: none; }
    .sidebar a.active { color: var(--accent); border-left-color: var(--accent); background: var(--bg-hover); font-weight: 500; }
    .theme-toggle {
      position: fixed; top: 12px; right: 12px; z-index: 100;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 14px; color: var(--text);
    }
    .theme-toggle:hover { background: var(--bg-hover); }
    .main { flex: 1; max-width: 860px; padding: 48px 56px; min-width: 0; }
    .toc {
      width: var(--toc-width); min-width: var(--toc-width);
      padding: 48px 16px 24px 0; position: sticky; top: 0; height: 100vh;
      overflow-y: auto; font-size: 13px;
    }
    .toc-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 8px; }
    .toc a { display: block; padding: 3px 0 3px 12px; color: var(--text-secondary); border-left: 1px solid var(--border); }
    .toc a:hover { color: var(--accent); text-decoration: none; border-left-color: var(--accent); }
    .toc a.h2 { padding-left: 12px; }
    .toc a.h3 { padding-left: 24px; font-size: 12px; }
    .markdown-body h1 { font-size: 2em; font-weight: 700; margin-bottom: 8px; letter-spacing: -.02em; }
    .markdown-body h2 { font-size: 1.5em; font-weight: 600; margin-top: 32px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .markdown-body h3 { font-size: 1.2em; font-weight: 600; margin-top: 24px; margin-bottom: 8px; }
    .markdown-body h4 { font-weight: 600; margin-top: 16px; }
    .markdown-body p, .markdown-body li { margin-bottom: 8px; color: var(--text); }
    .markdown-body code { background: var(--bg-code); padding: 2px 6px; border-radius: 4px; font-size: .85em; font-family: "SF Mono", "Fira Code", monospace; }
    .markdown-body pre { background: var(--bg-code); padding: 16px; border-radius: 6px; overflow-x: auto; margin: 16px 0; border: 1px solid var(--border); }
    .markdown-body pre code { background: none; padding: 0; border-radius: 0; }
    .markdown-body table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    .markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    .markdown-body th { background: var(--bg-code); font-weight: 600; }
    .markdown-body ul, .markdown-body ol { padding-left: 24px; margin: 8px 0; }
    .markdown-body li { margin-bottom: 4px; }
    .markdown-body img { max-width: 100%; border-radius: 6px; }
    .markdown-body blockquote { border-left: 4px solid var(--accent); padding-left: 16px; color: var(--text-secondary); margin: 16px 0; }
    .markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .markdown-body table tr:nth-child(2n) { background: var(--bg-sidebar); }
    .error { color: #f85149; padding: 24px; text-align: center; }
    .loading { text-align: center; padding: 48px; color: var(--text-muted); }
    @media (max-width: 1024px) { .toc { display: none; } .sidebar { width: 220px; min-width: 220px; } .main { padding: 32px 24px; } }
    @media (max-width: 768px) { .sidebar { display: none; } .main { padding: 24px 16px; max-width: 100%; } }
  </style>
</head>
<body>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      Engineering Docs
    </div>
    <div id="sidebar-links"></div>
  </nav>
  <div class="main">
    <div id="content" class="markdown-body"><div class="loading">Loading...</div></div>
  </div>
  <nav class="toc" id="toc">
    <div class="toc-label">On this page</div>
    <div id="toc-links"></div>
  </nav>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙 Dark</button>
  <script>
    const SIDEBAR_STRUCTURE = [
      { section: "Getting Started", links: [
        { label: "Welcome", href: "/engineering-docs/" },
        { label: "Quick Start", href: "/engineering-docs/01-getting-started/quickstart" },
        { label: "Onboarding Guide", href: "/engineering-docs/01-getting-started/onboarding" },
      ]},
      { section: "Guides", links: [
        { label: "Overview", href: "/engineering-docs/02-guides/README" },
        { label: "Development Guide", href: "/engineering-docs/02-guides/development-guide" },
        { label: "Best Practices", href: "/engineering-docs/02-guides/best-practices" },
      ]},
      { section: "Architecture", links: [
        { label: "System Overview", href: "/engineering-docs/03-architecture/system-overview" },
        { label: "ADRs", href: "/engineering-docs/03-architecture/decisions/README" },
      ]},
      { section: "Deployment", links: [
        { label: "Overview", href: "/engineering-docs/04-deployment/README" },
        { label: "Infrastructure", href: "/engineering-docs/04-deployment/infrastructure" },
        { label: "Runbooks", href: "/engineering-docs/04-deployment/runbooks" },
      ]},
      { section: "Standards", links: [
        { label: "Coding Standards", href: "/engineering-docs/05-standards/coding-standards" },
        { label: "Security Policies", href: "/engineering-docs/05-standards/security-policies" },
      ]},
      { section: "Operations", links: [
        { label: "Monitoring", href: "/engineering-docs/06-operations/monitoring" },
        { label: "Incident Response", href: "/engineering-docs/06-operations/incident-response" },
      ]},
      { section: "Projects", links: [
        { label: "macOS Dev Setup", href: "/engineering-docs/07-projects/macos-dev-setup" },
        { label: "Data Medallion", href: "/engineering-docs/07-projects/data-medallion" },
        { label: "Copilot Repo", href: "/engineering-docs/07-projects/copilot-repo" },
        { label: "n8n Production Stack", href: "/engineering-docs/07-projects/n8n-docker-prod-stack" },
        { label: "SonarQube Deployment", href: "/engineering-docs/07-projects/sonarqube-docker-deployment" },
      ]},
      { section: "Infrastructure", links: [
        { label: "Wiki.js Self-Hosted", href: "/engineering-docs/infra/wiki/README" },
        { label: "GitHub Sync Guide", href: "/engineering-docs/infra/wiki/GITHUB_SYNC" },
        { label: "Auth & Access Control", href: "/engineering-docs/infra/wiki/AUTH_SETUP" },
      ]},
    ]
    function renderSidebar(currentPath) {
      const el = document.getElementById('sidebar-links');
      el.innerHTML = SIDEBAR_STRUCTURE.map(g => {
        const items = g.links.map(l => {
          const active = currentPath && (l.href === currentPath || l.href + '/README' === currentPath) ? ' class="active"' : ''
          return `<a href="${l.href}"${active}>${l.label}</a>`
        }).join('')
        return `<div class="sidebar-section">${g.section}</div>${items}`
      }).join('')
    }
    function renderTOC(html) {
      const el = document.getElementById('toc-links')
      const headings = html.match(/<h([23])[^>]*id="([^"]+)"[^>]*>([^<]+)/g)
      if (!headings || headings.length < 2) { el.innerHTML = ''; return }
      el.innerHTML = headings.map(h => {
        const m = h.match(/<h([23])[^>]*id="([^"]+)"[^>]*>([^<]+)/)
        if (!m || m[1] === '1') return ''
        return `<a class="h${m[1]}" href="#${m[2]}">${m[3]}</a>`
      }).filter(Boolean).join('')
    }
    function getTheme() { return localStorage.getItem('theme') || 'light' }
    function setTheme(t) {
      document.documentElement.setAttribute('data-theme', t)
      localStorage.setItem('theme', t)
      document.getElementById('themeToggle').textContent = t === 'dark' ? '☀️ Light' : '🌙 Dark'
    }
    function toggleTheme() { setTheme(getTheme() === 'dark' ? 'light' : 'dark') }
    setTheme(getTheme())
    async function loadPage() {
      const base = '/engineering-docs/'
      let path = location.pathname.replace(base, '').replace(/\?.*$/, '') || 'README.md'
      const mdPath = (path.endsWith('.md') ? path : path + '.md').replace(/^\.\//, '')
      const pageUrl = base + mdPath
      renderSidebar(location.pathname)
      try {
        const r = await fetch(pageUrl)
        if (!r.ok) throw new Error('Page not found')
        const md = await r.text()
        const html = marked.parse(md, { gfm: true })
        document.getElementById('content').innerHTML = html
        renderTOC(html)
        document.querySelectorAll('.markdown-body a[href]').forEach(a => {
          const h = a.getAttribute('href')
          if (h && !h.startsWith('http') && !h.startsWith('#') && !h.startsWith('/')) {
            a.setAttribute('href', base + h.replace(/\.md/g, ''))
          }
        })
        document.querySelectorAll('.markdown-body h2, .markdown-body h3').forEach(h => {
          if (!h.id) h.id = h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '')
        })
        renderTOC(document.getElementById('content').innerHTML)
        document.title = document.querySelector('.markdown-body h1')?.textContent + ' · Engineering Docs' || 'Engineering Docs'
      } catch (err) { document.getElementById('content').innerHTML = `<div class="error">${err.message}</div>` }
    }
    loadPage()
  </script>
</body>
</html>
