<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engineering Docs</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6; color: #1f2328; background: #fff; padding: 32px;
    }
    .markdown-body {
      max-width: 960px; margin: 0 auto; padding: 32px;
      border: 1px solid #d0d7de; border-radius: 8px;
    }
    .markdown-body h1 { border-bottom: 1px solid #d0d7de; padding-bottom: .3em; font-size: 2em; }
    .markdown-body h2 { border-bottom: 1px solid #d0d7de; padding-bottom: .3em; font-size: 1.5em; margin-top: 24px; }
    .markdown-body h3 { font-size: 1.25em; margin-top: 24px; }
    .markdown-body a { color: #0969da; text-decoration: none; }
    .markdown-body a:hover { text-decoration: underline; }
    .markdown-body code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: .85em; }
    .markdown-body pre { background: #f3f4f6; padding: 16px; border-radius: 6px; overflow-x: auto; }
    .markdown-body pre code { background: none; padding: 0; }
    .markdown-body table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    .markdown-body th, .markdown-body td { border: 1px solid #d0d7de; padding: 8px 12px; text-align: left; }
    .markdown-body th { background: #f6f8fa; }
    .markdown-body ul, .markdown-body ol { padding-left: 24px; margin: 8px 0; }
    .markdown-body img { max-width: 100%; }
    .markdown-body blockquote { border-left: 4px solid #d0d7de; padding-left: 16px; color: #656d76; }
    .markdown-body .anchor-link { display: none; }
    .sidebar { max-width: 960px; margin: 0 auto 16px; }
    .sidebar a { color: #0969da; text-decoration: none; font-size: .9em; margin-right: 16px; }
    .sidebar a:hover { text-decoration: underline; }
    .error { color: #cf222e; padding: 16px; text-align: center; }
    .loading { text-align: center; padding: 48px; color: #656d76; }
  </style>
</head>
<body>
  <nav class="sidebar">
    <a href="./">Home</a>
    <a href="https://github.com/vanchasrujankumar/engineering-docs">GitHub</a>
    <a href="01-getting-started/README.html">Getting Started</a>
    <a href="02-guides/README.html">Guides</a>
    <a href="03-architecture/README.html">Architecture</a>
    <a href="04-deployment/README.html">Deployment</a>
    <a href="05-standards/README.html">Standards</a>
    <a href="06-operations/README.html">Operations</a>
    <a href="07-projects/README.html">Projects</a>
  </nav>
  <div id="content" class="markdown-body"><div class="loading">Loading...</div></div>
  <script>
    const path = location.pathname.replace('/engineering-docs/', '') || 'README.md'
    const mdPath = path.replace(/\.html$/, '.md')
    fetch(mdPath)
      .then(r => {
        if (!r.ok) throw new Error('Not found: ' + mdPath)
        return r.text()
      })
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md)
        // Fix relative links for GitHub Pages
        document.querySelectorAll('a[href]').forEach(a => {
          const href = a.getAttribute('href')
          if (href && !href.startsWith('http') && !href.startsWith('#') && !href.startsWith('./')) {
            a.setAttribute('href', href.replace(/\.md/g, '.html'))
          }
        })
        // Highlight current page in nav
        const slug = path.replace('.md', '').replace('.html', '')
        document.querySelectorAll('.sidebar a').forEach(a => {
          if (a.getAttribute('href').includes(slug) && slug !== '') {
            a.style.fontWeight = 'bold'
          }
        })
      })
      .catch(err => {
        document.getElementById('content').innerHTML =
          '<div class="error">' + err.message + '</div>'
      })
  </script>
</body>
</html>
